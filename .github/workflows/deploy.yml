name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            api/config.php
            uploads/**
            reset-admin.php
            migrate.php
            migrate2.php
            database.sql

      - name: Fix permissions and remove sensitive files
        run: |
          sudo apt-get install -y lftp -qq
          lftp -c "set ssl:verify-certificate no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftps://${{ secrets.FTP_HOST }}:21; chmod 755 . 2>/dev/null; glob -a chmod 644 .htaccess *.html 2>/dev/null; glob -a chmod 644 *.php 2>/dev/null; chmod 755 api 2>/dev/null; cd api; glob -a chmod 644 *.php 2>/dev/null; cd ..; rm -f migrate.php migrate2.php reset-admin.php 2>/dev/null || true; bye"
