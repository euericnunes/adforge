name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/config.php
            uploads/**
            reset-admin.php
            migrate.php
            migrate2.php
            database.sql

      - name: Remove sensitive files from server
        run: |
          sudo apt-get install -y lftp -qq
          lftp -c "set ssl:verify-certificate no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftps://${{ secrets.FTP_HOST }}:21; rm -f migrate.php migrate2.php reset-admin.php 2>/dev/null || true; bye"
